<!-- Example: How to use the Country Picker in a Reservation Form -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Reservation Form with Country Picker</title>
    <link rel="stylesheet" href="country-picker.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .form-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            color: #333;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        textarea:focus {
            outline: none;
            border-color: #ff6b35;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .phone-group {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .phone-group > div {
            flex: 1;
        }

        .phone-group label {
            margin-bottom: 8px;
        }

        #mbCountryCode {
            display: none;
        }

        .phone-input-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .phone-input-wrapper input {
            flex: 1;
        }

        .phone-dial-display {
            padding: 12px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-weight: 600;
            color: #ff6b35;
            min-width: 50px;
            text-align: center;
            font-size: 14px;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: #ff6b35;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background: #ff5a22;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        .form-note {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        @media (max-width: 600px) {
            .form-container {
                padding: 20px;
            }

            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>🍽️ Make a Reservation</h1>

        <form id="reservationForm">
            <!-- Name -->
            <div class="form-group">
                <label for="guestName">Full Name *</label>
                <input type="text" id="guestName" name="guestName" placeholder="Your full name" required>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="guestEmail">Email *</label>
                <input type="email" id="guestEmail" name="guestEmail" placeholder="your.email@example.com" required>
            </div>

            <!-- Phone with Country Picker -->
            <div class="form-group">
                <label for="mbCountryCode">Phone Number *</label>
                <div class="phone-group">
                    <!-- Country Picker Container -->
                    <div id="mbCountryPickerContainer"></div>
                    <!-- Hidden Select for form submission -->
                    <select id="mbCountryCode" name="countryCode">
                        <option value="91" selected>India</option>
                    </select>
                    <!-- Phone Input -->
                    <div>
                        <div class="phone-input-wrapper">
                            <span class="phone-dial-display" id="phoneDial">+91</span>
                            <input type="tel" id="guestPhone" name="phone" placeholder="9876543210" pattern="[0-9]{6,15}" required>
                        </div>
                        <p class="form-note">10 digits for India, 6-15 for others</p>
                    </div>
                </div>
            </div>

            <!-- Date -->
            <div class="form-group">
                <label for="reservationDate">Preferred Date *</label>
                <input type="date" id="reservationDate" name="reservationDate" required>
            </div>

            <!-- Time -->
            <div class="form-group">
                <label for="reservationTime">Preferred Time *</label>
                <input type="time" id="reservationTime" name="reservationTime" required>
            </div>

            <!-- Guests -->
            <div class="form-group">
                <label for="guestCount">Number of Guests *</label>
                <input type="number" id="guestCount" name="guestCount" min="1" max="100" value="2" required>
            </div>

            <!-- Message -->
            <div class="form-group">
                <label for="guestMessage">Special Requests (Optional)</label>
                <textarea id="guestMessage" name="message" placeholder="Any dietary restrictions, occasion details, etc."></textarea>
            </div>

            <!-- Submit -->
            <button type="submit">Request Reservation</button>
        </form>
    </div>

    <!-- Load Country Picker Script -->
    <script src="country-picker.js"></script>

    <!-- Update Phone Dial Display -->
    <script>
        const countryCode = document.getElementById('mbCountryCode');
        const phoneDial = document.getElementById('phoneDial');

        // Update phone dial when country changes
        countryCode.addEventListener('change', (e) => {
            phoneDial.textContent = '+' + e.target.value;
        });

        // Form submission handler
        document.getElementById('reservationForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = {
                name: document.getElementById('guestName').value,
                email: document.getElementById('guestEmail').value,
                countryCode: document.getElementById('mbCountryCode').value,
                phone: document.getElementById('guestPhone').value,
                date: document.getElementById('reservationDate').value,
                time: document.getElementById('reservationTime').value,
                guests: document.getElementById('guestCount').value,
                message: document.getElementById('guestMessage').value,
            };

            console.log('Reservation Data:', formData);
            alert('Reservation request submitted! We will contact you soon.');
            
            // In a real application, you would send this data to your server
            // fetch('/api/reservations', {
            //     method: 'POST',
            //     headers: { 'Content-Type': 'application/json' },
            //     body: JSON.stringify(formData)
            // }).then(res => res.json()).then(data => {
            //     console.log('Success:', data);
            // });
        });
    </script>
</body>
</html>
